name: Found a bug
description: Report a reproducible problem in textmode.accurate.js.
title: '[Bug]: '
labels: ['bug']
body:
    - type: textarea
      id: summary
      attributes:
          label: Summary
          description: What happened?
      validations:
          required: true
    - type: textarea
      id: reproduce
      attributes:
          label: Reproduction
          description: Provide a minimal sketch, repo, or steps to reproduce.
      validations:
          required: true
    - type: input
      id: versions
      attributes:
          label: Versions
          description: Include textmode.js, textmode.accurate.js, browser, and OS versions.
      validations:
          required: true
